<svg width="200" height="52" viewBox="0 0 200 52" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Artemis Bet</title>

  <!-- A letterform - left stroke -->
  <polygon points="8,48 24,4 30,4 22,26" fill="#ffffff"/>
  <!-- A letterform - right stroke -->
  <polygon points="52,48 36,4 30,4 38,26" fill="#4FA8F5"/>
  <!-- A crossbar -->
  <rect x="20" y="28" width="20" height="5" rx="2" fill="#ffffff"/>

  <!-- Star top right of A -->
  <g transform="translate(56,10)">
    <polygon points="0,-7 1.5,-1.5 7,0 1.5,1.5 0,7 -1.5,1.5 -7,0 -1.5,-1.5" fill="#4FA8F5"/>
    <circle cx="9" cy="-7" r="1.8" fill="#4FA8F5"/>
  </g>

  <!-- ARTEMIS text -->
  <text x="72" y="24" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="18" fill="#ffffff" letter-spacing="2">ARTEMIS</text>
  <!-- BET text -->
  <text x="72" y="44" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="14" fill="#4FA8F5" letter-spacing="4">BET</text>
</svg>